<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clinic Appointment System</title>
    <link rel="stylesheet" href="/static/styles.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>Clinic Appointment System</h1>
            <p>Register, login, view doctors, and book appointments from a simple UI.</p>
        </header>
        <main>
            <section class="card" id="auth-section">
                <h2>Authentication</h2>
                <div class="tabs">
                    <button id="tab-login" class="tab active">Login</button>
                    <button id="tab-register" class="tab">Register</button>
                </div>

                <div id="login-form" class="tab-content active">
                    <input type="text" id="login-username" placeholder="Username">
                    <input type="password" id="login-password" placeholder="Password">
                    <button id="login-button">Login</button>
                </div>

                <div id="register-form" class="tab-content">
                    <select id="register-role">
                        <option value="patient">Patient</option>
                        <option value="doctor">Doctor</option>
                    </select>
                    <input type="text" id="register-username" placeholder="Username">
                    <input type="email" id="register-email" placeholder="Email">
                    <input type="password" id="register-password" placeholder="Password">
                    <input type="text" id="register-full-name" placeholder="Full Name">
                    <input type="text" id="register-specialization" placeholder="Specialization (doctors only)">
                    <input type="text" id="register-working-days" placeholder="Working Days (Mon,Tue,Fri)">
                    <input type="time" id="register-start-time" placeholder="Start Time">
                    <input type="time" id="register-end-time" placeholder="End Time">
                    <input type="number" id="register-age" placeholder="Age (patients only)">
                    <input type="text" id="register-gender" placeholder="Gender (patients only)">
                    <input type="text" id="register-phone" placeholder="Phone (patients only)">
                    <input type="text" id="register-address" placeholder="Address (patients only)">
                    <button id="register-button">Register</button>
                </div>
            </section>

            <section class="card hidden" id="dashboard-section">
                <h2>Dashboard</h2>
                <div class="status-row">
                    <span id="login-status"></span>
                    <button id="logout-button">Logout</button>
                </div>
                <div class="actions">
                    <button id="load-doctors-button">Load Doctors</button>
                    <button id="view-appointments-button">My Appointments</button>
                </div>

                <div id="doctor-list" class="list"></div>
                <div id="appointment-list" class="list"></div>
                <div id="slot-section" class="hidden card">
                    <h3>Available Slots</h3>
                    <input type="date" id="slot-date">
                    <button id="load-slots-button">Check Slots</button>
                    <div id="slots-container" class="list"></div>
                </div>
            </section>

            <section class="card hidden" id="message-section">
                <h2>Message</h2>
                <div id="message-box"></div>
            </section>
        </main>
    </div>
    <script src="/static/main.js"></script>
</body>
</html>
